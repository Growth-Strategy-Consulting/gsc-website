<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C4534"/>
      <stop offset="1" stop-color="#27543F"/>
    </linearGradient>
    <radialGradient id="sun2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#D8BC8A"/>
      <stop offset="1" stop-color="#1C4534" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#grd)"/>
  <circle cx="230" cy="210" r="230" fill="url(#sun2)" opacity=".55"/>
  <!-- rising path -->
  <path d="M70 650 L290 470 L450 540 L700 250" fill="none" stroke="#C2A36B" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 250 l-46 4 m46 -4 l-4 46" fill="none" stroke="#C2A36B" stroke-width="6" stroke-linecap="round"/>
  <!-- nodes -->
  <circle cx="70" cy="650" r="9" fill="#E7D9BF"/>
  <circle cx="290" cy="470" r="9" fill="#E7D9BF"/>
  <circle cx="450" cy="540" r="9" fill="#E7D9BF"/>
  <circle cx="700" cy="250" r="11" fill="#E7D9BF"/>
  <!-- growth bars -->
  <g>
    <rect x="110" y="700" width="36" height="72" rx="6" fill="#3A6B54"/>
    <rect x="158" y="668" width="36" height="104" rx="6" fill="#4A7C64"/>
    <rect x="206" y="634" width="36" height="138" rx="6" fill="#C2A36B"/>
  </g>
  <!-- dotted motif -->
  <g fill="#C2A36B" opacity=".4">
    <circle cx="560" cy="120" r="4"/><circle cx="592" cy="120" r="4"/><circle cx="624" cy="120" r="4"/>
    <circle cx="560" cy="152" r="4"/><circle cx="592" cy="152" r="4"/><circle cx="624" cy="152" r="4"/>
    <circle cx="560" cy="184" r="4"/><circle cx="592" cy="184" r="4"/><circle cx="624" cy="184" r="4"/>
  </g>
</svg>
