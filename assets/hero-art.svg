<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF6EC"/>
      <stop offset="1" stop-color="#F1E4CE"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ECD6AB"/>
      <stop offset="1" stop-color="#DCBE88"/>
    </radialGradient>
  </defs>
  <rect width="800" height="700" fill="url(#sky)"/>
  <circle cx="300" cy="250" r="130" fill="url(#sun)"/>
  <!-- gold linework -->
  <path d="M0 430 Q200 380 420 420 T800 405" fill="none" stroke="#C2A36B" stroke-width="2" opacity=".7"/>
  <path d="M0 405 Q220 360 460 398 T800 380" fill="none" stroke="#C2A36B" stroke-width="1.5" opacity=".45"/>
  <!-- growth bars on the hillside -->
  <g>
    <rect x="596" y="330" width="28" height="78" rx="5" fill="#1F4D3A"/>
    <rect x="634" y="296" width="28" height="112" rx="5" fill="#2C5C47"/>
    <rect x="672" y="256" width="28" height="152" rx="5" fill="#C2A36B"/>
  </g>
  <!-- dunes -->
  <path d="M0 470 Q200 408 400 458 T800 450 V700 H0 Z" fill="#E7D9BF"/>
  <path d="M0 542 Q220 480 460 532 T800 520 V700 H0 Z" fill="#D9C29A"/>
  <path d="M0 612 Q240 560 520 602 T800 590 V700 H0 Z" fill="#C9B083"/>
</svg>
